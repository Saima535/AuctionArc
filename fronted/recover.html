<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recover Password - AuctionArc</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #1a1a1a;
    color: #d4af37;
    font-family: 'Segoe UI';
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CONTAINER */
.recover-container {
    width: 100%;
    max-width: 400px;
}

/* BOX */
.recover-box {
    background: #2a2a2a;
    padding: 30px;
    border-radius: 6px;
    text-align: center;
}

/* TEXT */
h2 {
    color: white;
    margin-bottom: 10px;
}

p {
    color: #999;
    margin-bottom: 25px;
}

/* INPUT */
.input-wrapper {
    position: relative;
    margin-bottom: 20px;
}

.input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #d4af37;
}

input {
    width: 100%;
    padding: 12px;
    padding-left: 40px;
    background: #1a1a1a;
    border: 1px solid #444;
    color: #d4af37;
}

input:focus {
    outline: none;
    border-color: #d4af37;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: #d4af37;
    border: none;
    color: #1a1a1a;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #c19b2e;
}

/* BACK LINK */
.back-link {
    margin-top: 20px;
    display: block;
    color: #999;
    text-decoration: none;
}

.back-link:hover {
    color: #d4af37;
}
</style>
</head>

<body>

<div class="recover-container">

<div class="recover-box">
    <h2>Recover Your Password</h2>
    <p>Enter your email to reset your password</p>

    <form onsubmit="handleSubmit(event)">
        
        <div class="input-wrapper">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="email" placeholder="you@example.com" required>
        </div>

        <button type="submit">Send Reset Link</button>
    </form>

    <a href="login.html" class="back-link">← Back to Sign In</a>
</div>

</div>

<script>
function handleSubmit(e) {
    e.preventDefault();
    alert("Check your email for reset instructions!");
}
</script>

</body>
</html>
